<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
.badge-3d-container {
  position: fixed;
  bottom: 20px;
  right: 20px; /* Позиция в углу экрана */
  width: 120px; /* Размер стикера */
  height: 170px;
  perspective: 1000px;
  z-index: 9999;
}

.badge-3d-spinner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: rotateVolumetric 6s infinite linear;
}

.badge-3d-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
}


.badge-3d-layer:not(.front):not(.back) {
  filter: brightness(0.5); 
}


@keyframes rotateVolumetric {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}
</style>

<a href="#" target="_blank" class="badge-3d-container">
  <div class="badge-3d-spinner">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer front" style="transform: translateZ(0px);">
    
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-1px);">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-2px);">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-3px);">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-4px);">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-5px);">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-6px);">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-7px);">
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer" style="transform: translateZ(-8px);">
    
    <img src="Здесь хорошо_с обводкой.png" class="badge-3d-layer back" style="transform: translateZ(-9px) rotateY(180deg);">
  </div>
</a>
</body>
</html>
